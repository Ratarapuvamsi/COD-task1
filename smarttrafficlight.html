<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Traffic Light Controller</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e293b, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      width: 350px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .traffic-light {
      width: 120px;
      background: #222;
      padding: 20px;
      border-radius: 20px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .light {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #444;
      transition: 0.3s ease;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }

    .red.active {
      background: red;
      box-shadow: 0 0 20px red;
    }

    .yellow.active {
      background: yellow;
      box-shadow: 0 0 20px yellow;
    }

    .green.active {
      background: limegreen;
      box-shadow: 0 0 20px limegreen;
    }

    .controls {
      margin-top: 20px;
    }

    button {
      padding: 10px 18px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .start-btn {
      background: #22c55e;
      color: white;
    }

    .stop-btn {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Traffic Light Controller</h1>

    <div class="traffic-light">
      <div class="light red" id="red"></div>
      <div class="light yellow" id="yellow"></div>
      <div class="light green" id="green"></div>
    </div>

    <div class="controls">
      <button class="start-btn" onclick="startTraffic()">Start</button>
      <button class="stop-btn" onclick="stopTraffic()">Stop</button>
    </div>

    <div class="status" id="status">System Stopped</div>
  </div>

  <script>
    let currentLight = 0;
    let interval;

    const lights = ["red", "green", "yellow"];
    const statusText = {
      red: "STOP",
      yellow: "READY",
      green: "GO"
    };

    function resetLights() {
      document.getElementById("red").classList.remove("active");
      document.getElementById("yellow").classList.remove("active");
      document.getElementById("green").classList.remove("active");
    }

    function switchLight() {
      resetLights();

      const light = lights[currentLight];
      document.getElementById(light).classList.add("active");
      document.getElementById("status").innerText =
        "Traffic Status: " + statusText[light];

      currentLight = (currentLight + 1) % lights.length;
    }

    function startTraffic() {
      stopTraffic();
      switchLight();
      interval = setInterval(switchLight, 3000);
    }

    function stopTraffic() {
      clearInterval(interval);
      resetLights();
      document.getElementById("status").innerText = "System Stopped";
    }
  </script>
</body>
</html>
